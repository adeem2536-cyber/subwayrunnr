<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Speed Runner</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#0f172a;
}

canvas{
display:block;
}

#menu,#gameOver{
position:absolute;
width:100%;
top:40%;
text-align:center;
color:white;
}

button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
}

#hud{
position:absolute;
top:15px;
left:20px;
color:white;
font-size:20px;
}

</style>
</head>

<body>

<div id="menu">
<h1>🏃 Speed Runner</h1>
<button onclick="startGame()">PLAY</button>
</div>

<div id="gameOver" style="display:none">
<h1>Game Over</h1>
<p id="finalScore"></p>
<button onclick="restart()">Restart</button>
</div>

<div id="hud">
Score: <span id="score">0</span> |
Coins: <span id="coins">0</span>
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

const lanes=[-120,0,120]
let lane=1

let player={
y:0,
vy:0,
jump:false,
slide:false,
width:60,
height:90
}

let obstacles=[]
let coins=[]

let speed=8
let score=0
let coinCount=0
let playing=false

function startGame(){
document.getElementById("menu").style.display="none"
playing=true
loop()
}

function restart(){
location.reload()
}

function spawnObstacle(){

let laneIndex=Math.floor(Math.random()*3)

obstacles.push({
lane:laneIndex,
z:1000,
w:70,
h:90
})

}

function spawnCoin(){

let laneIndex=Math.floor(Math.random()*3)

coins.push({
lane:laneIndex,
z:1000,
r:20
})

}

setInterval(spawnObstacle,1400)
setInterval(spawnCoin,900)

function drawRoad(){

ctx.fillStyle="#1e293b"
ctx.fillRect(canvas.width/2-200,0,400,canvas.height)

ctx.strokeStyle="white"
ctx.lineWidth=4

for(let i=1;i<3;i++){

ctx.beginPath()
ctx.moveTo(canvas.width/2-200+i*133,0)
ctx.lineTo(canvas.width/2-200+i*133,canvas.height)
ctx.stroke()

}

}

function drawPlayer(){

ctx.fillStyle="#38bdf8"

ctx.fillRect(
canvas.width/2 + lanes[lane]-30,
canvas.height-150-player.y,
player.width,
player.height
)

}

function drawObstacles(){

ctx.fillStyle="#ef4444"

for(let o of obstacles){

let scale=300/o.z

let x=canvas.width/2 + lanes[o.lane]*scale
let y=canvas.height-200

ctx.fillRect(x,y,o.w*scale,o.h*scale)

o.z-=speed

if(o.z<80 && o.lane===lane && !player.jump){
gameOver()
}

}

obstacles=obstacles.filter(o=>o.z>0)

}

function drawCoins(){

ctx.fillStyle="gold"

for(let c of coins){

let scale=300/c.z

let x=canvas.width/2 + lanes[c.lane]*scale
let y=canvas.height-250

ctx.beginPath()
ctx.arc(x,y,c.r*scale,0,Math.PI*2)
ctx.fill()

c.z-=speed

if(c.z<80 && c.lane===lane){

coinCount++
document.getElementById("coins").innerText=coinCount
c.z=0

}

}

coins=coins.filter(c=>c.z>0)

}

function update(){

if(player.jump){

player.vy+=1
player.y+=player.vy

if(player.y>=0){
player.jump=false
player.y=0
player.vy=0
}

}

speed+=0.002
score++

document.getElementById("score").innerText=score

}

function loop(){

if(!playing) return

ctx.clearRect(0,0,canvas.width,canvas.height)

drawRoad()

update()

drawCoins()

drawObstacles()

drawPlayer()

requestAnimationFrame(loop)

}

function gameOver(){

playing=false

document.getElementById("gameOver").style.display="block"
document.getElementById("finalScore").innerText="Score: "+score

let high=localStorage.getItem("speedrunner_highscore")||0

if(score>high){
localStorage.setItem("speedrunner_highscore",score)
}

}

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowLeft" && lane>0) lane--

if(e.key==="ArrowRight" && lane<2) lane++

if(e.key==="ArrowUp" && !player.jump){
player.jump=true
player.vy=-18
}

})

let sx=0
let sy=0

canvas.addEventListener("touchstart",(e)=>{

sx=e.touches[0].clientX
sy=e.touches[0].clientY

})

canvas.addEventListener("touchend",(e)=>{

let dx=e.changedTouches[0].clientX-sx
let dy=e.changedTouches[0].clientY-sy

if(Math.abs(dx)>Math.abs(dy)){

if(dx>40 && lane<2) lane++
if(dx<-40 && lane>0) lane--

}else{

if(dy<-40 && !player.jump){

player.jump=true
player.vy=-18

}

}

})

</script>
</body>
</html>
